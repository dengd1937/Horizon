name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00（北京时间 08:00）
  workflow_dispatch:       # 保留手动触发

concurrency:
  group: horizon-production-site
  cancel-in-progress: false

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COS_SITE_BUCKET: cos://signalfeed-1257788828
      COS_STATE_BUCKET: ${{ vars.COS_STATE_BUCKET || 'cos://signalfeed-state-1257788828' }}
      COS_ENDPOINT: cos.ap-hongkong.myqcloud.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Prepare config and data
        run: |
          cp data/config.github.json data/config.json
          echo '${{ secrets.SUBSCRIBERS_JSON }}' > data/subscribers.json
          echo '${{ secrets.X_COOKIES }}' > data/x_cookies_1.json

      - name: Install coscli
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/coscli" \
            https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-linux-amd64
          chmod +x "$HOME/.local/bin/coscli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set report date
        run: echo "HORIZON_REPORT_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      # Restore only the compact canonical state. Historical HTML and media stay
      # in COS and are referenced through the release manifest.
      - name: Restore incremental publication state
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: uv run python scripts/restore_site_state.py daily --date "$HORIZON_REPORT_DATE"

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: uv run horizon --hours 24

      - name: Publish incremental daily release
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: uv run python scripts/publish_site.py daily

      - name: Persist email delivery state
        if: always()
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          if [ -f data/email_delivery_state.json ]; then
            coscli cp data/email_delivery_state.json \
              "$COS_STATE_BUCKET/.horizon-state/email_delivery_state.json" \
              -i "$COS_SECRET_ID" -k "$COS_SECRET_KEY" -e "$COS_ENDPOINT" \
              --init-skip=true --acl private
          fi
