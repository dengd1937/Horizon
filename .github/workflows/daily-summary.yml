name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00（北京时间 08:00）
  workflow_dispatch:       # 保留手动触发

concurrency:
  group: horizon-production-site
  cancel-in-progress: false

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Prepare config and data
        run: |
          cp data/config.github.json data/config.json
          echo '${{ secrets.SUBSCRIBERS_JSON }}' > data/subscribers.json
          echo '${{ secrets.X_COOKIES }}' > data/x_cookies_1.json

      - name: Install coscli
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/coscli" \
            https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-linux-amd64
          chmod +x "$HOME/.local/bin/coscli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Runners are stateless: restore the full deployed tree before rendering.
      # This preserves historical pages and lets the renderer migrate old paths
      # before COS sync removes their obsolete remote objects. The d/ prefix is
      # a permanent compatibility layer for previously published URLs.
      - name: Pull deployed site state
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          mkdir -p data/site
          coscli sync "cos://signalfeed-1257788828/" data/site/ -r --exclude "^d/.*$" \
            -i "$COS_SECRET_ID" -k "$COS_SECRET_KEY" -e cos.ap-hongkong.myqcloud.com

      - name: Restore email delivery state
        run: |
          if [ -f data/site/.horizon-state/email_delivery_state.json ]; then
            cp data/site/.horizon-state/email_delivery_state.json data/email_delivery_state.json
          fi

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: uv run horizon --hours 48

      - name: Persist email delivery state
        if: always()
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          if [ -f data/email_delivery_state.json ]; then
            mkdir -p data/site/.horizon-state
            cp data/email_delivery_state.json data/site/.horizon-state/email_delivery_state.json
            coscli cp data/email_delivery_state.json \
              "cos://signalfeed-1257788828/.horizon-state/email_delivery_state.json" \
              -i "$COS_SECRET_ID" -k "$COS_SECRET_KEY" -e cos.ap-hongkong.myqcloud.com
          fi
