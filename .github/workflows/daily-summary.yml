name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00（北京时间 08:00）
  workflow_dispatch:       # 保留手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Prepare config and data
        run: |
          cp data/config.github.json data/config.json
          echo '${{ secrets.SUBSCRIBERS_JSON }}' > data/subscribers.json
          echo '${{ secrets.X_COOKIES }}' > data/x_cookies_1.json

      - name: Install coscli
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL -o "$HOME/.local/bin/coscli" \
            https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-linux-amd64
          chmod +x "$HOME/.local/bin/coscli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Runners are stateless: pull the archive manifest back so the
      # index page keeps accumulating across days. Missing file = first run.
      - name: Pull site archive state
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_SITE_PREFIX: ${{ secrets.COS_SITE_PREFIX }}
        run: |
          mkdir -p data/site
          coscli cp "cos://signalfeed-1257788828/d/${COS_SITE_PREFIX}/site_manifest.json" \
            data/site/site_manifest.json \
            -i "$COS_SECRET_ID" -k "$COS_SECRET_KEY" -e cos.ap-hongkong.myqcloud.com \
            || echo "No manifest yet (first deploy)"

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_SITE_PREFIX: ${{ secrets.COS_SITE_PREFIX }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
