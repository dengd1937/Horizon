name: Publish Content Libraries

on:
  push:
    branches:
      - main
    paths:
      - "articles/**"
      - "papers/**"
      - "src/papers/**"
      - "src/render/curated.py"
      - "src/render/article_index_js.py"
      - "src/render/papers.py"
      - "src/render/paper_index_js.py"
      - "src/render/site.py"
      - "src/render/site_css.py"
      - "src/models.py"
      - "scripts/render_articles.py"
  workflow_dispatch:

concurrency:
  group: horizon-production-site
  cancel-in-progress: false

jobs:
  publish-articles:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare site configuration
        run: cp data/config.github.json data/config.json

      - name: Install coscli
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/coscli" \
            https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-linux-amd64
          chmod +x "$HOME/.local/bin/coscli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Preserve the daily section, root redirect, and historical media before
      # the configured COS sync applies its --delete migration policy. The d/
      # prefix is excluded because it serves permanent redirects for old URLs.
      - name: Pull deployed site state
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          mkdir -p data/site
          coscli sync "cos://signalfeed-1257788828/" data/site/ -r --exclude "^d/.*$" \
            -i "$COS_SECRET_ID" -k "$COS_SECRET_KEY" -e cos.ap-hongkong.myqcloud.com

      - name: Render and publish content libraries
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: uv run python scripts/render_articles.py
