name: Publish Content Libraries

on:
  push:
    branches:
      - main
    paths:
      - "articles/**"
      - "papers/**"
      - "src/papers/**"
      - "src/render/curated.py"
      - "src/render/article_index_js.py"
      - "src/render/papers.py"
      - "src/render/paper_index_js.py"
      - "src/render/publication.py"
      - "src/render/site.py"
      - "src/render/site_css.py"
      - "src/models.py"
      - "scripts/render_articles.py"
      - "scripts/publish_site.py"
      - "scripts/restore_site_state.py"
  workflow_dispatch:

concurrency:
  group: horizon-production-site
  cancel-in-progress: false

jobs:
  publish-articles:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COS_SITE_BUCKET: cos://signalfeed-1257788828
      COS_STATE_BUCKET: ${{ vars.COS_STATE_BUCKET || 'cos://signalfeed-state-1257788828' }}
      COS_ENDPOINT: cos.ap-hongkong.myqcloud.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare site configuration
        run: cp data/config.github.json data/config.json

      - name: Install coscli
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/coscli" \
            https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-linux-amd64
          chmod +x "$HOME/.local/bin/coscli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore content-library publication state
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: uv run python scripts/restore_site_state.py libraries

      # One-time cutover path: when no release manifest exists yet, restore only
      # curated-article media (never the growing daily archive). The renderer
      # turns these files into a local baseline manifest before publishing.
      - name: Bootstrap existing content media
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          if [ ! -f data/site/.horizon-state/releases/libraries.json ]; then
            mkdir -p data/site/assets/articles
            coscli cp "$COS_SITE_BUCKET/assets/articles/" data/site/assets/articles/ -r \
              -i "$COS_SECRET_ID" -k "$COS_SECRET_KEY" -e "$COS_ENDPOINT" \
              --init-skip=true
          fi

      - name: Render content libraries
        run: uv run python scripts/render_articles.py

      - name: Publish incremental content-library release
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: uv run python scripts/publish_site.py libraries
