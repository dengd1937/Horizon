name: Rebuild Historical Daily Pages

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: First UTC report date (YYYY-MM-DD)
        required: true
        type: string
      date_to:
        description: Last UTC report date; blank means one day
        required: false
        type: string
      publish:
        description: Publish after rebuilding (false only performs a dry-run)
        required: true
        default: false
        type: boolean
      allow_missing_sources:
        description: Skip legacy dates without structured run JSON
        required: true
        default: false
        type: boolean

concurrency:
  group: horizon-production-site
  cancel-in-progress: false

jobs:
  rebuild-daily-site:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COS_SITE_BUCKET: cos://signalfeed-1257788828
      COS_STATE_BUCKET: ${{ vars.COS_STATE_BUCKET || 'cos://signalfeed-state-1257788828' }}
      COS_ENDPOINT: cos.ap-hongkong.myqcloud.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare site configuration
        run: cp data/config.github.json data/config.json

      - name: Install coscli
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/coscli" \
            https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-linux-amd64
          chmod +x "$HOME/.local/bin/coscli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Rebuild selected dates
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          DATE_FROM: ${{ inputs.date_from }}
          DATE_TO: ${{ inputs.date_to }}
          PUBLISH: ${{ inputs.publish }}
          ALLOW_MISSING: ${{ inputs.allow_missing_sources }}
        run: |
          rebuild_args=(--from "$DATE_FROM" --to "$DATE_TO")
          if [ "$PUBLISH" = "true" ]; then
            rebuild_args+=(--publish)
          fi
          if [ "$ALLOW_MISSING" = "true" ]; then
            rebuild_args+=(--allow-missing-sources)
          fi
          uv run python scripts/rebuild_daily_site.py "${rebuild_args[@]}"
